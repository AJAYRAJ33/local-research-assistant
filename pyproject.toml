[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["llama.cpp", "merged-model", "outputs", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = ["llama\\.cpp", "merged.model", "outputs"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
